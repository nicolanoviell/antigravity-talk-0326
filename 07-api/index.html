<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Van Gogh Pop Art Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>VAN GOGH <span class="pop">POP ART</span></h1>
        <p class="subtitle">Capolavori classici, stile contemporaneo.</p>
    </header>

    <main id="gallery-container">
        <!-- 'O caricamento... statte accorto! -->
        <div id="loader" class="loader">
            <div class="spinner"></div>
            <p>Stammo caricann' 'e quadri... aspetta nu mumento!</p>
        </div>
        
        <div id="gallery-grid" class="grid hidden">
            <!-- Cca veneno 'e carte de l'opere -->
        </div>
    </main>

    <footer>
        <p>Fatto co' ammore (e API d''o Met) &copy; 2026</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
